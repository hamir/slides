  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ew of the Karbala tragedy from the standard Sunni perspective, free of sectarian bigotry. 61 AH / 680 CE.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;position:relative;overflow:hidden;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:40px;\">\n    <span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan>\n    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#bf9b4a;\">Lecture · Historical Analysis<\u002Fspan>\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:132px;line-height:0.98;margin:0;color:#f4ecd8;letter-spacing:-0.5px;\">The Massacre<br>of Karbala<\u002Fh1>\n  <div style=\"width:160px;height:2px;background:#bf9b4a;margin:48px 0 30px;\"><\u002Fdiv>\n  <p style=\"font-size:38px;line-height:1.45;color:#c8cdbb;max-width:1180px;margin:0;font-weight:300;\">A detailed reading of the events, the figures, and the question of responsibility — from the standard Sunni historical perspective.<\u002Fp>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;color:#7e8c78;margin-top:70px;\">61 AH · 680 CE &nbsp;—&nbsp; AFTER IBN KATHIR &amp; IBN HAJAR<\u002Fdiv>\n<\u002Fsection>\n\n<!-- 2 · CONTENTS -->\n<section data-label=\"Contents\" data-screen-label=\"02\" data-speaker-notes=\"Walk the arc of the lecture in one breath: method, the family, the roots, the uprising, the journey, the tragedy, the reckoning.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Contents<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.02;margin:14px 0 50px;\">Six movements<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;column-gap:120px;row-gap:30px;max-width:1560px;\">\n    <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid #d9cfb4;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">I<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">The Rank of the Ahl al-Bayt<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">The middle path between two extremes<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid #d9cfb4;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">II<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">Roots of the Conflict<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">41 – 60 AH: civil war and succession<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid #d9cfb4;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">III<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">The Uprising in Kufa<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">Invitation, mission, and betrayal<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid #d9cfb4;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">IV<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">The Journey &amp; the Warnings<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">The counsel of the senior Companions<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;border-bottom:1px solid #d9cfb4;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">V<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">The Tragedy at Karbala<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">61 AH: interception and massacre<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:baseline;padding-bottom:22px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#bf9b4a;\">VI<\u002Fspan><div><div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;\">Analysis &amp; Responsibility<\u002Fdiv><div style=\"font-size:24px;color:#6f6a58;\">The culprits and the Sunni verdict<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 6 · DIVIDER II -->\n<section data-label=\"I · Divider\" data-screen-label=\"03\" data-speaker-notes=\"Before the politics, establish who the family is and the rank Sunnis give them.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part One<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">I<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">The Rank of the Ahl al-Bayt<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">Who the Prophet's family are, and the honour — and limits — that come with that lineage.<\u002Fp>\n<\u002Fsection>\n\n<!-- 7 · MIDDLE PATH -->\n<section data-label=\"The Sunni Middle Path\" data-screen-label=\"04\" data-speaker-notes=\"Sunnis reject two extremes: the Nawasib who curse or disrespect the family, and the extremists who attribute divine powers to them. The honoured position sits between.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section I · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 48px;\">The Sunni middle path<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:50px;align-items:center;max-width:1640px;\">\n    <div style=\"background:#ece2c9;padding:42px;border-radius:0;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:16px;\">Extreme One<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;margin-bottom:14px;\">The Nawāsib<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.45;margin:0;color:#4a4636;\">Those who curse or disrespect the Ahl al-Bayt.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 6px;\">\n      <span style=\"width:22px;height:22px;border:2px solid #bf9b4a;transform:rotate(45deg);display:inline-block;margin-bottom:18px;\"><\u002Fspan>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:34px;color:#1f5a42;line-height:1.2;\">honour<br>without<br>excess<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:42px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:16px;\">Extreme Two<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;margin-bottom:14px;\">The Extremists<\u002Fdiv>\n      <p style=\"font-size:28px;line-height:1.45;margin:0;color:#4a4636;\">Those who grant them supernatural or divine privileges that belong to Allah alone.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:30px;line-height:1.5;margin:44px 0 0;color:#39402f;max-width:1500px;\">The Sunni position holds the centre: deep love and respect for the family, with worship reserved for God.<\u002Fp>\n<\u002Fsection>\n\n<!-- 8 · WHO ARE THE AHL AL-BAYT (LINEAGE) -->\n<section data-label=\"Who Are the Ahl al-Bayt\" data-screen-label=\"05\" data-speaker-notes=\"Definition is layered: the wives of the Prophet (per Surah al-Ahzab), the kernel of Fatima, Ali, Hassan and Hussein (Hadith of the Cloak), and the broader relatives — the descendants of Abbas, Ja'far and Aqil. Those who were righteous, related, and Companions hold a triple honour.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:74px 100px 64px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section I · 02<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;line-height:1.0;margin:12px 0 12px;\">Who are the Ahl al-Bayt?<\u002Fh2>\n  <div style=\"display:flex;align-items:flex-start;gap:56px;flex:1;\">\n    <!-- lineage tree -->\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;padding-top:14px;\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#6f6a58;border-bottom:1px solid #cbbf9f;padding-bottom:6px;margin-bottom:30px;\">ʿAbd al-Muṭṭalib<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;width:100%;text-align:center;\">\n        <div>\n          <div style=\"font-size:24px;color:#7a7360;margin-bottom:12px;\">ʿAbdullāh<\u002Fdiv>\n          <div style=\"background:#0f211a;color:#f4ecd8;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:14px 8px;\">Prophet Muḥammad ﷺ<\u002Fdiv>\n          <div style=\"font-size:24px;color:#7a7360;margin:14px 0 8px;\">↓ daughter<\u002Fdiv>\n          <div style=\"border:2px solid #bf9b4a;background:#f7efd9;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;padding:12px 8px;\">Fāṭima<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:24px;color:#7a7360;margin-bottom:12px;\">Abū Ṭālib<\u002Fdiv>\n          <div style=\"border:2px solid #bf9b4a;background:#f7efd9;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;padding:12px 8px;\">ʿAlī<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:14px;\">\n            <div style=\"flex:1;background:#ece2c9;font-size:24px;padding:10px 4px;\">Jaʿfar<\u002Fdiv>\n            <div style=\"flex:1;background:#ece2c9;font-size:24px;padding:10px 4px;\">ʿAqīl<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:24px;color:#7a7360;margin-bottom:12px;\">al-ʿAbbās<\u002Fdiv>\n          <div style=\"background:#ece2c9;font-size:24px;padding:12px 8px;line-height:1.3;\">Uncle of the Prophet — his line, the ʿAbbāsid descendants<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:#842231;letter-spacing:0.1em;margin:26px 0 14px;\">ʿALĪ ⚭ FĀṬIMA<\u002Fdiv>\n      <div style=\"display:flex;gap:22px;\">\n        <div style=\"border:2px solid #bf9b4a;background:#0f211a;color:#f4ecd8;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:14px 30px;\">Ḥasan<\u002Fdiv>\n        <div style=\"border:2px solid #bf9b4a;background:#0f211a;color:#f4ecd8;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:14px 30px;\">Ḥusayn<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- legend -->\n    <div style=\"width:430px;flex-shrink:0;border-left:1px solid #d4c9aa;padding-left:46px;display:flex;flex-direction:column;gap:30px;padding-top:14px;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px;\"><span style=\"width:18px;height:18px;border:2px solid #bf9b4a;background:#f7efd9;display:inline-block;\"><\u002Fspan><span style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;\">The kernel<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:25px;line-height:1.4;margin:0;color:#4a4636;\">Fāṭima, ʿAlī, Ḥasan, Ḥusayn — affirmed by the Ḥadīth of the Cloak.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px;\"><span style=\"width:18px;height:18px;background:#ece2c9;display:inline-block;\"><\u002Fspan><span style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;\">Broader relatives<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:25px;line-height:1.4;margin:0;color:#4a4636;\">The descendants of ʿAbbās, Jaʿfar and ʿAqīl.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">The wives<\u002Fdiv>\n        <p style=\"font-size:25px;line-height:1.4;margin:0;color:#4a4636;\">Explicitly included, on the Qurʾānic context of Sūrah al-Aḥzāb.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#0f211a;color:#e7dcc2;padding:22px 24px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#bf9b4a;margin-bottom:8px;\">Triple blessing<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;margin:0;\">Righteous · related · a Companion — a threefold honour.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 9 · LIMITS OF LINEAGE (PULL QUOTE) -->\n<section data-label=\"The Limits of Lineage\" data-screen-label=\"06\" data-speaker-notes=\"Bloodline brings honour, not infallibility. Each person answers for their own deeds.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 150px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#bf9b4a;margin-bottom:36px;\">Section I · 03 — The limits of lineage<\u002Fspan>\n  <div style=\"font-family:'Cormorant Garamond',serif;font-size:74px;line-height:1.18;font-weight:500;font-style:italic;color:#f4ecd8;max-width:1500px;\">\"Whoever's deeds pulled him back, his blood will not push him forward.\"<\u002Fdiv>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:46px 0 24px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;line-height:1.5;color:#b9c1ad;max-width:1300px;margin:0;font-weight:300;\">Lineage is deeply respected — but it grants no infallibility. A person remains responsible for what they do.<\u002Fp>\n<\u002Fsection>\n\n<!-- 10 · DIVIDER III -->\n<section data-label=\"II · Divider\" data-screen-label=\"07\" data-speaker-notes=\"Move into the political history: two decades of strain between Hassan's peace and Hussein's stand.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part Two<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">II<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">Roots of the Conflict<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">41 – 60 AH<\u002Fp>\n<\u002Fsection>\n\n<!-- 11 · TIMELINE -->\n<section data-label=\"Twenty Years to Karbala\" data-screen-label=\"08\" data-speaker-notes=\"Trace the chain: Hassan's peace in 41, Muawiya's death and Yazid's succession in 60, the refusal and flight, the mission to Kufa, and the road that ends at Karbala in 61.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:80px 100px 70px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section II · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.0;margin:12px 0 64px;\">Twenty years to Karbala<\u002Fh2>\n  <div style=\"position:relative;flex:1;display:flex;align-items:flex-start;\">\n    <div style=\"position:absolute;top:18px;left:2%;right:2%;height:2px;background:#cdbf9c;\"><\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;width:100%;gap:24px;\">\n      <div style=\"flex:1;text-align:center;position:relative;\">\n        <div style=\"width:18px;height:18px;background:#1f5a42;transform:rotate(45deg);margin:10px auto 26px;\"><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:12px;\">41 AH<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">Hassan's peace<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;color:#5b5645;margin:0;\">Ḥasan abdicates; the Caliphate passes to Muʿāwiya.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;text-align:center;position:relative;\">\n        <div style=\"width:18px;height:18px;background:#bf9b4a;transform:rotate(45deg);margin:10px auto 26px;\"><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:12px;\">60 AH<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">Succession<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;color:#5b5645;margin:0;\">Muʿāwiya dies; Yazīd succeeds. Ḥusayn refuses allegiance and leaves for Mecca.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;text-align:center;position:relative;\">\n        <div style=\"width:18px;height:18px;background:#bf9b4a;transform:rotate(45deg);margin:10px auto 26px;\"><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:12px;\">60 AH<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">The Kufa mission<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;color:#5b5645;margin:0;\">Muslim ibn ʿAqīl is sent ahead; thousands pledge their oath.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;text-align:center;position:relative;\">\n        <div style=\"width:18px;height:18px;background:#842231;transform:rotate(45deg);margin:10px auto 26px;\"><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:12px;\">9 DHU-L-ḤIJJA<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">The turn<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;color:#5b5645;margin:0;\">Muslim is captured and executed as Kufa abandons him.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;text-align:center;position:relative;\">\n        <div style=\"width:18px;height:18px;background:#842231;transform:rotate(45deg);margin:10px auto 26px;\"><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:12px;\">10 MUḤARRAM 61<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;margin-bottom:8px;\">Karbala<\u002Fdiv>\n        <p style=\"font-size:24px;line-height:1.4;color:#5b5645;margin:0;\">Ḥusayn and his companions are killed.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 12 · TRAUMA OF CIVIL WAR -->\n<section data-label=\"The Trauma of Civil War\" data-screen-label=\"09\" data-speaker-notes=\"The First Fitna — Jamal and Siffin — was devastating. More Muslims died in these internal wars than in the early conquests. That memory shapes every decision that follows.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section II · 02<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 50px;max-width:1300px;\">The trauma of civil war<\u002Fh2>\n  <div style=\"display:flex;align-items:center;gap:80px;max-width:1640px;\">\n    <div style=\"flex-shrink:0;\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:150px;font-weight:600;line-height:0.9;color:#842231;\">Jamal<br><span style=\"font-size:64px;color:#bf9b4a;font-style:italic;\">&amp;<\u002Fspan><br>Ṣiffīn<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #d4c9aa;padding-left:64px;\">\n      <p style=\"font-size:38px;line-height:1.5;margin:0 0 28px;color:#39402f;max-width:980px;\">The First Fitna left the community scarred. More Muslims died in these internal conflicts than in the early conquests.<\u002Fp>\n      <p style=\"font-size:30px;line-height:1.5;margin:0;color:#6f6a58;max-width:980px;\">It is against this raw memory of bloodshed that the next generation's choices — peace, succession, and stand — must be understood.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 13 · HASSAN'S ABDICATION -->\n<section data-label=\"Hassan's Abdication\" data-screen-label=\"10\" data-speaker-notes=\"In 41 AH, to stop the bleeding, Hassan voluntarily handed the Caliphate to Muawiya. Sunni tradition praises this as maturity and wisdom — and as fulfilment of the Prophet's prophecy that Hassan would reconcile two great factions.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section II · 03<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 16px;\">Hassan's abdication<\u002Fh2>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:26px;color:#842231;margin-bottom:50px;\">41 AH — the Year of Unity<\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1620px;\">\n    <p style=\"font-size:36px;line-height:1.5;margin:0;color:#39402f;\">To end the bloodshed, <strong>Ḥasan ibn ʿAlī<\u002Fstrong> voluntarily abdicated the Caliphate in favour of Muʿāwiya — choosing the unity of the Ummah over his own claim.<\u002Fp>\n    <div>\n      <p style=\"font-size:32px;line-height:1.5;margin:0 0 28px;color:#4a4636;\">Sunni tradition praises the act as one of <em>maturity and wisdom<\u002Fem>.<\u002Fp>\n      <div style=\"background:#0f211a;color:#e7dcc2;padding:34px 38px;\">\n        <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:33px;line-height:1.35;margin:0;\">It fulfilled the Prophet's word that Ḥasan would one day reconcile two great parties of the Muslims.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 14 · NOMINATION OF YAZID -->\n<section data-label=\"The Nomination of Yazid\" data-screen-label=\"11\" data-speaker-notes=\"Muawiya nominated his son Yazid to secure stability and forestall another civil war. Sunnis respect Muawiya as a Companion but need not endorse the decision — many were far better qualified: Hussein, Ibn al-Zubayr, Ibn Umar.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section II · 04<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 48px;\">The nomination of Yazid<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:80px;max-width:1640px;align-items:start;\">\n    <div>\n      <p style=\"font-size:36px;line-height:1.5;margin:0 0 30px;color:#39402f;\">Muʿāwiya nominated his son <strong>Yazīd<\u002Fstrong> as successor — intending to guarantee stability and avoid a return to civil war.<\u002Fp>\n      <p style=\"font-size:30px;line-height:1.5;margin:0;color:#6f6a58;\">Sunnis respect Muʿāwiya as a Companion, yet need not agree with this political choice.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:40px 44px;border-top:3px solid #bf9b4a;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#a9893f;margin-bottom:22px;\">Far better qualified<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;line-height:1.55;\">Ḥusayn ibn ʿAlī<br>ʿAbdullāh ibn al-Zubayr<br>ʿAbdullāh ibn ʿUmar<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 15 · YAZID PROFILE -->\n<section data-label=\"Yazid: A Profile\" data-screen-label=\"12\" data-speaker-notes=\"Yazid was born in 26 AH — not a Companion. His chief merit in the record: he led the first army to march on Constantinople, an expedition the Prophet said would bring forgiveness.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section II · 05<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 54px;\">Yazid: a profile<\u002Fh2>\n  <div style=\"display:flex;gap:50px;max-width:1660px;\">\n    <div style=\"flex:1;background:#ece2c9;padding:40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#6f6a58;margin-bottom:14px;\">Born<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:600;\">26 AH<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.4;margin:14px 0 0;color:#4a4636;\">A generation after the Prophet — and so <strong>not a Companion<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex:1.4;background:#0f211a;color:#e7dcc2;padding:40px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#bf9b4a;margin-bottom:14px;\">Chief merit<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;line-height:1.2;\">The march on Constantinople<\u002Fdiv>\n      <p style=\"font-size:27px;line-height:1.45;margin:16px 0 0;\">He led the first army to set out against the city — an expedition the Prophet said would bring forgiveness to its soldiers.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 16 · DIVIDER IV -->\n<section data-label=\"III · Divider\" data-screen-label=\"13\" data-speaker-notes=\"Now to Kufa, where invitation curdles into betrayal.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part Three<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">III<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">The Uprising in Kufa<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">Sixty letters, an oath of thousands, and a crackdown that emptied the streets in a day.<\u002Fp>\n<\u002Fsection>\n\n<!-- 17 · REFUSAL & INVITATION -->\n<section data-label=\"Refusal and Invitation\" data-screen-label=\"14\" data-speaker-notes=\"On Muawiya's death, Hussein left Medina for Mecca rather than pledge to Yazid. From Kufa — long a centre of Alid sympathy — came over sixty letters promising support if he led a rising.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section III · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 54px;\">Refusal and invitation<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1640px;align-items:center;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:18px;\">The refusal<\u002Fdiv>\n      <p style=\"font-size:36px;line-height:1.5;margin:0;color:#39402f;\">Rather than be forced to pledge to Yazīd, Ḥusayn left <strong>Medina for Mecca<\u002Fstrong> — seeking the sanctuary of the Ḥaram.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #d4c9aa;padding-left:64px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:18px;\">The invitation<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;margin-bottom:18px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:104px;font-weight:600;color:#bf9b4a;line-height:0.8;\">60+<\u002Fspan><span style=\"font-size:30px;color:#6f6a58;\">letters from Kūfa<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:30px;line-height:1.5;margin:0;color:#39402f;\">A long-standing centre of Alid sympathy, Kūfa pledged to support him if he led a rising against the Umayyads.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 18 · MUSLIM IBN AQIL -->\n<section data-label=\"The Mission of Muslim ibn Aqil\" data-screen-label=\"15\" data-speaker-notes=\"Hussein sent his cousin Muslim ibn Aqil as a scout. Between twelve and forty thousand gave their oath. Sensing real enthusiasm, Muslim urged Hussein to come at once.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section III · 02<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 50px;\">The mission of Muslim ibn ʿAqīl<\u002Fh2>\n  <div style=\"display:flex;gap:70px;align-items:center;max-width:1660px;\">\n    <div style=\"flex:1;\">\n      <p style=\"font-size:36px;line-height:1.5;margin:0 0 26px;color:#39402f;\">Ḥusayn sent his cousin <strong>Muslim ibn ʿAqīl<\u002Fstrong> ahead to Kūfa as a scout — to test whether the promises were real.<\u002Fp>\n      <p style=\"font-size:32px;line-height:1.5;margin:0;color:#4a4636;\">The response was overwhelming. Muslim sent word for Ḥusayn to come <em>immediately<\u002Fem>.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"flex-shrink:0;background:#0f211a;color:#e7dcc2;padding:48px 56px;text-align:center;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#bf9b4a;margin-bottom:20px;\">Oaths of allegiance<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:600;line-height:0.9;color:#f4ecd8;\">12,000<div style=\"font-size:40px;font-style:italic;color:#bf9b4a;margin:8px 0;\">to<\u002Fdiv>40,000<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 19 · THE GREAT BETRAYAL -->\n<section data-label=\"The Great Betrayal\" data-screen-label=\"16\" data-speaker-notes=\"Yazid replaced the gentle governor with Ubaydullah ibn Ziyad — vicious, shrewd, just 28. Through a spy, bribery and tribal threats he dismantled Muslim's support. In twelve hours a guard of four thousand fell to none. Muslim was captured and executed on 9 Dhul-Hijjah, his last words a plea for God to judge those who seduced and abandoned him.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:80px 110px 70px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section III · 03<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 44px;\">The great betrayal<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:70px;max-width:1680px;align-items:start;\">\n    <div>\n      <div style=\"background:#ece2c9;padding:34px 38px;border-top:3px solid #842231;margin-bottom:30px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#842231;margin-bottom:12px;\">The new governor<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;\">ʿUbaydullāh ibn Ziyād <span style=\"font-size:26px;color:#7a7360;\">age 28<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:27px;line-height:1.45;margin:12px 0 0;color:#4a4636;\">Yazīd replaced the gentle governor with a man the sources call vicious and shrewd. With a spy, bribery and tribal threats, he unravelled the support for Muslim.<\u002Fp>\n      <\u002Fdiv>\n      <p style=\"font-size:30px;line-height:1.5;margin:0;color:#39402f;\">Muslim was found alone, captured, and executed on the <strong>9th of Dhū-l-Ḥijja<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:30px;\">\n      <div style=\"background:#0f211a;color:#e7dcc2;padding:38px 42px;text-align:center;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#bf9b4a;margin-bottom:16px;\">In twelve hours<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:30px;font-family:'Cormorant Garamond',serif;font-weight:600;line-height:0.9;\">\n          <span style=\"font-size:88px;color:#f4ecd8;\">4,000<\u002Fspan>\n          <span style=\"font-size:48px;color:#bf9b4a;\">→<\u002Fspan>\n          <span style=\"font-size:88px;color:#bf9b4a;\">0<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:25px;margin:18px 0 0;color:#b9c1ad;\">A four-thousand-man guard melted away to nothing.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-left:3px solid #842231;padding-left:30px;\">\n        <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:33px;line-height:1.35;margin:0;color:#39402f;\">His last words: a plea for God to judge those who seduced him — and then abandoned him.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 20 · DIVIDER V -->\n<section data-label=\"IV · Divider\" data-screen-label=\"17\" data-speaker-notes=\"The senior Companions saw what was coming and tried to stop it.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part Four<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">IV<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">The Journey &amp; the Warnings<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">Hussein departs on the 8th of Dhū-l-Ḥijja — unaware that his cousin is already dead.<\u002Fp>\n<\u002Fsection>\n\n<!-- 21 · COUNSEL OF THE SAHABA -->\n<section data-label=\"The Counsel of the Sahaba\" data-screen-label=\"18\" data-speaker-notes=\"Senior Companions — Ibn Abbas, Ibn Umar, Jabir, Muhammad ibn al-Hanafiyya — begged him not to go, recalling how Kufa had betrayed his father Ali. Hussein felt a moral duty to the thousands of letters, and wished to move the conflict away from Mecca to protect the sanctity of the Haram.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section IV · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 46px;\">The counsel of the Companions<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1660px;align-items:start;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:22px;\">They begged him not to go<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-bottom:26px;\">\n        <span style=\"background:#ece2c9;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:12px 24px;\">Ibn ʿAbbās<\u002Fspan>\n        <span style=\"background:#ece2c9;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:12px 24px;\">Ibn ʿUmar<\u002Fspan>\n        <span style=\"background:#ece2c9;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:12px 24px;\">Jābir<\u002Fspan>\n        <span style=\"background:#ece2c9;font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;padding:12px 24px;\">Muḥammad ibn al-Ḥanafiyya<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.5;margin:0;color:#4a4636;\">Their warning rested on memory: Kūfa had already betrayed his father ʿAlī. Why trust it now?<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #d4c9aa;padding-left:64px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#1f5a42;margin-bottom:22px;\">Why he went<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.5;margin:0 0 24px;color:#39402f;\">A moral duty to the thousands who had written to him.<\u002Fp>\n      <p style=\"font-size:33px;line-height:1.5;margin:0;color:#39402f;\">And a wish to draw the conflict <strong>away from Mecca<\u002Fstrong> — to spare the sanctity of the Ḥaram.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 22 · IBN UMAR PULL QUOTE -->\n<section data-label=\"Ibn Umar's Warning\" data-screen-label=\"19\" data-speaker-notes=\"Ibn Umar's argument: the Prophet was offered the world and chose the hereafter. His descendants, then, were not meant to be kings — but righteous leaders.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 150px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#bf9b4a;margin-bottom:36px;\">Section IV · 02 — Ibn ʿUmar's counsel<\u002Fspan>\n  <div style=\"font-family:'Cormorant Garamond',serif;font-size:66px;line-height:1.22;font-weight:500;font-style:italic;color:#f4ecd8;max-width:1560px;\">\"The Prophet was offered this world and chose the Hereafter. His descendants were never meant to be kings — but righteous leaders.\"<\u002Fdiv>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:46px 0 22px;\"><\u002Fdiv>\n  <p style=\"font-size:28px;color:#9aa692;margin:0;font-family:'IBM Plex Mono',monospace;letter-spacing:0.12em;\">— THE ARGUMENT OF ʿABDULLĀH IBN ʿUMAR<\u002Fp>\n<\u002Fsection>\n\n<!-- 23 · MAP -->\n<section data-label=\"The Road to Karbala\" data-screen-label=\"20\" data-speaker-notes=\"The route in space: from Medina to Mecca for sanctuary, then the turn north toward Kufa — and the interception short of it, at Karbala. Schematic, not to scale.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:74px 100px 60px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section IV · 03<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;line-height:1.0;margin:12px 0 8px;\">The road to Karbala<\u002Fh2>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;color:#9a917a;letter-spacing:0.08em;margin-bottom:30px;\">SCHEMATIC ROUTE — NOT TO SCALE<\u002Fdiv>\n  <div style=\"position:relative;flex:1;background:#efe6cf;border:1px solid #ddd0ad;\">\n    <svg viewBox=\"0 0 1600 560\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;\">\n      <polyline points=\"250,150 250,400 1080,400 1300,210\" fill=\"none\" stroke=\"#bf9b4a\" stroke-width=\"3\" stroke-dasharray=\"3 14\" stroke-linecap=\"round\"><\u002Fpolyline>\n    <\u002Fsvg>\n    <!-- Medina -->\n    <div style=\"position:absolute;left:14%;top:18%;transform:translate(-50%,-50%);text-align:center;\">\n      <div style=\"width:20px;height:20px;background:#1f5a42;transform:rotate(45deg);margin:0 auto 12px;\"><\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;\">Medina<\u002Fdiv>\n      <div style=\"font-size:24px;color:#6f6a58;\">refuses the pledge<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Mecca -->\n    <div style=\"position:absolute;left:14%;top:74%;transform:translate(-50%,-50%);text-align:center;\">\n      <div style=\"width:20px;height:20px;background:#bf9b4a;transform:rotate(45deg);margin:0 auto 12px;\"><\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;\">Mecca<\u002Fdiv>\n      <div style=\"font-size:24px;color:#6f6a58;\">sanctuary of the Ḥaram<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Karbala -->\n    <div style=\"position:absolute;left:67%;top:74%;transform:translate(-50%,-50%);text-align:center;\">\n      <div style=\"width:24px;height:24px;background:#842231;transform:rotate(45deg);margin:0 auto 12px;box-shadow:0 0 0 6px rgba(132,34,49,0.16);\"><\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;color:#842231;\">Karbala<\u002Fdiv>\n      <div style=\"font-size:24px;color:#6f6a58;\">intercepted, 3 Muḥarram<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Kufa -->\n    <div style=\"position:absolute;left:82%;top:40%;transform:translate(-50%,-50%);text-align:center;\">\n      <div style=\"width:20px;height:20px;border:2px solid #6f6a58;background:#efe6cf;transform:rotate(45deg);margin:0 auto 12px;\"><\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:#6f6a58;\">Kūfa<\u002Fdiv>\n      <div style=\"font-size:24px;color:#9a917a;\">the destination never reached<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:40%;top:80%;transform:translate(-50%,0);font-family:'IBM Plex Mono',monospace;font-size:24px;color:#a8a085;letter-spacing:0.1em;\">the long turn north<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 24 · DIVIDER VI -->\n<section data-label=\"V · Divider\" data-screen-label=\"21\" data-speaker-notes=\"The events of the tenth of Muharram, 61 AH.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part Five<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">V<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">The Tragedy at Karbala<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">61 AH<\u002Fp>\n<\u002Fsection>\n\n<!-- 25 · INTERCEPTION & OPTIONS -->\n<section data-label=\"Interception and Three Options\" data-screen-label=\"22\" data-speaker-notes=\"On 3 Muharram, Hussein's party of seventy to eighty was halted by Umar ibn Sa'd and four thousand troops. Seeing the betrayal, Hussein offered three reasonable resolutions: return to Mecca, go to Damascus to negotiate with Yazid directly, or withdraw into exile.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:80px 110px 70px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section V · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.0;margin:12px 0 14px;\">Interception and three options<\u002Fh2>\n  <p style=\"font-size:30px;line-height:1.45;color:#4a4636;margin:0 0 44px;max-width:1500px;\">On <strong>3 Muḥarram<\u002Fstrong>, a party of 70–80 was stopped at Karbala by ʿUmar ibn Saʿd and 4,000 troops. Seeing he was betrayed, Ḥusayn offered three reasonable ways out.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:36px;max-width:1700px;\">\n    <div style=\"background:#ece2c9;padding:38px 36px;border-top:3px solid #bf9b4a;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:42px;color:#bf9b4a;margin-bottom:18px;\">01<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;margin-bottom:12px;\">Return to Mecca<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.45;margin:0;color:#4a4636;\">Withdraw peacefully to where he had come from.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:38px 36px;border-top:3px solid #bf9b4a;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:42px;color:#bf9b4a;margin-bottom:18px;\">02<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;margin-bottom:12px;\">Go to Damascus<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.45;margin:0;color:#4a4636;\">Negotiate with Yazīd in person, ruler to kinsman.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:38px 36px;border-top:3px solid #bf9b4a;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:42px;color:#bf9b4a;margin-bottom:18px;\">03<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;margin-bottom:12px;\">Go into exile<\u002Fdiv>\n      <p style=\"font-size:26px;line-height:1.45;margin:0;color:#4a4636;\">Depart to a far-off land, out of the dispute entirely.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 26 · IMPASSE & BATTLE -->\n<section data-label=\"The Impasse and the Battle\" data-screen-label=\"23\" data-speaker-notes=\"Ibn Ziyad refused every option, demanding personal surrender. Hussein, choosing dignity over humiliation, would not give his hand to the impetuous governor. On 10 Muharram a massacre followed: his family killed one by one shielding him, until Hussein himself was killed by a group led by Shimr ibn Dhil-Jawshan and Sinan ibn Anas.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:84px 110px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#bf9b4a;\">Section V · 02<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.0;margin:12px 0 48px;color:#f4ecd8;\">The impasse and the battle<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1660px;align-items:start;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#bf9b4a;margin-bottom:20px;\">The impasse<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.5;margin:0 0 26px;color:#e2dac6;\">Ibn Ziyād refused every option, demanding that Ḥusayn surrender to him <em>personally<\u002Fem>.<\u002Fp>\n      <p style=\"font-size:33px;line-height:1.5;margin:0;color:#e2dac6;\">Choosing dignity over humiliation, Ḥusayn would not place his hand in that of the impetuous governor.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #2a4a3c;padding-left:64px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#d98a96;margin-bottom:20px;\">10 Muḥarram<\u002Fdiv>\n      <p style=\"font-size:33px;line-height:1.5;margin:0 0 30px;color:#e2dac6;\">A massacre followed. His family were killed one by one, shielding him to the last.<\u002Fp>\n      <div style=\"background:#842231;padding:30px 34px;\">\n        <p style=\"font-size:30px;line-height:1.45;margin:0;color:#f6e6d6;\">Ḥusayn was killed by a group led by <strong>Shimr ibn Dhī-l-Jawshan<\u002Fstrong> and <strong>Sinān ibn Anas<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 27 · AFTERMATH -->\n<section data-label=\"The Aftermath\" data-screen-label=\"24\" data-speaker-notes=\"Hussein's head was severed and sent to Ibn Ziyad, whose disrespect toward it was publicly condemned by the Companion Anas ibn Malik. His son Ali Zayn al-Abidin survived only because illness had kept him from the fighting — and through him the line continued.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section V · 03<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:62px;line-height:1.0;margin:12px 0 50px;\">The aftermath<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:70px;max-width:1660px;align-items:stretch;\">\n    <div style=\"background:#ece2c9;padding:42px 44px;border-top:3px solid #842231;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#842231;margin-bottom:18px;\">The desecration<\u002Fdiv>\n      <p style=\"font-size:31px;line-height:1.5;margin:0 0 22px;color:#39402f;\">Ḥusayn's head was severed and sent to Ibn Ziyād.<\u002Fp>\n      <p style=\"font-size:29px;line-height:1.5;margin:0;color:#4a4636;\">His disrespectful treatment of it was <strong>publicly condemned<\u002Fstrong> by the Companion Anas ibn Mālik.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#0f211a;color:#e7dcc2;padding:42px 44px;border-top:3px solid #1f5a42;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.16em;text-transform:uppercase;color:#7fae8e;margin-bottom:18px;\">The survivor<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;margin-bottom:14px;\">ʿAlī Zayn al-ʿĀbidīn<\u002Fdiv>\n      <p style=\"font-size:29px;line-height:1.5;margin:0;\">Ḥusayn's son survived only because illness had kept him from the battle. Through him, the line continued.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 28 · DIVIDER VII -->\n<section data-label=\"VI · Divider\" data-screen-label=\"25\" data-speaker-notes=\"Who bears the responsibility — and what the event does, and does not, change.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <div style=\"display:flex;align-items:center;gap:22px;margin-bottom:26px;\"><span style=\"width:15px;height:15px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.32em;text-transform:uppercase;color:#bf9b4a;\">Part Six<\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:150px;color:#1f3b30;line-height:0.85;font-weight:500;\">VI<\u002Fdiv>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:84px;line-height:1.02;margin:10px 0 0;color:#f4ecd8;\">Analysis &amp; Responsibility<\u002Fh2>\n  <div style=\"width:120px;height:2px;background:#bf9b4a;margin:34px 0 26px;\"><\u002Fdiv>\n  <p style=\"font-size:30px;color:#b9c1ad;max-width:1080px;margin:0;font-weight:300;\">Apportioning blame — and weighing what Karbala means for Sunni creed.<\u002Fp>\n<\u002Fsection>\n\n<!-- 29 · FOUR CULPRITS -->\n<section data-label=\"The Four Culprits\" data-screen-label=\"26\" data-speaker-notes=\"Four parties carry the blame, in different measure: the people of Kufa, who seduced and abandoned him; Ibn Ziyad, the mastermind who forced confrontation; Shimr and Sinan, the physical killers; and Yazid, who likely did not order the murder but failed to punish it and kept Ibn Ziyad in power.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:74px 90px 60px;display:flex;flex-direction:column;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section VI · 01<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;line-height:1.0;margin:12px 0 12px;\">The four culprits<\u002Fh2>\n  <p style=\"font-size:25px;color:#7a7360;margin:0 0 36px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;\">◆ = WEIGHT OF RESPONSIBILITY<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:28px;flex:1;\">\n    <div style=\"background:#ece2c9;padding:34px 30px;display:flex;flex-direction:column;border-top:3px solid #842231;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:#842231;margin-bottom:14px;\">Seduction<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;line-height:1.05;margin-bottom:16px;\">The People of Kūfa<\u002Fdiv>\n      <div style=\"font-size:30px;letter-spacing:6px;color:#842231;margin-bottom:18px;\">◆◆◆<span style=\"color:#cbbf9f;\">◆<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:24px;line-height:1.42;margin:0;color:#4a4636;\">Lured him with promises, then vanished while he camped at their door for six days.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:34px 30px;display:flex;flex-direction:column;border-top:3px solid #842231;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:#842231;margin-bottom:14px;\">The mastermind<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;line-height:1.05;margin-bottom:16px;\">ʿUbaydullāh ibn Ziyād<\u002Fdiv>\n      <div style=\"font-size:30px;letter-spacing:6px;color:#842231;margin-bottom:18px;\">◆◆◆◆<\u002Fdiv>\n      <p style=\"font-size:24px;line-height:1.42;margin:0;color:#4a4636;\">The governor who refused every settlement and forced a violent confrontation.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:34px 30px;display:flex;flex-direction:column;border-top:3px solid #842231;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:#842231;margin-bottom:14px;\">The killers<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;line-height:1.05;margin-bottom:16px;\">Shimr &amp; Sinān<\u002Fdiv>\n      <div style=\"font-size:30px;letter-spacing:6px;color:#842231;margin-bottom:18px;\">◆◆◆◆<\u002Fdiv>\n      <p style=\"font-size:24px;line-height:1.42;margin:0;color:#4a4636;\">Those who struck the blows — acting with barbaric, ignorant brutality.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#ece2c9;padding:34px 30px;display:flex;flex-direction:column;border-top:3px solid #bf9b4a;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:#a9893f;margin-bottom:14px;\">Failure to punish<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;line-height:1.05;margin-bottom:16px;\">Yazīd<\u002Fdiv>\n      <div style=\"font-size:30px;letter-spacing:6px;color:#842231;margin-bottom:18px;\">◆◆<span style=\"color:#cbbf9f;\">◆◆<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:24px;line-height:1.42;margin:0;color:#4a4636;\">Likely did not order the murder — but never punished the culprits, and kept Ibn Ziyād in power.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 30 · A TRAGEDY, NOT A DOCTRINE -->\n<section data-label=\"A Tragedy, Not a Doctrine\" data-screen-label=\"27\" data-speaker-notes=\"The lasting effect: Karbala transformed Shiism from a political movement into a theological one, built on the guilt of the betrayal. The Sunni position: a historical tragedy of the highest magnitude, but not a theological pillar. Law and creed are unchanged — though the heart still bleeds for the grandson of the Prophet.\" style=\"box-sizing:border-box;background:#f4eede;color:#20271f;padding:84px 110px;display:flex;flex-direction:column;justify-content:center;font-family:'Spectral',serif;\">\n  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#a9893f;\">Section VI · 02<\u002Fspan>\n  <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;line-height:1.02;margin:14px 0 50px;\">A tragedy, not a doctrine<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:80px;max-width:1660px;align-items:start;\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#842231;margin-bottom:20px;\">The theological shift<\u002Fdiv>\n      <p style=\"font-size:34px;line-height:1.5;margin:0;color:#39402f;\">The betrayal transformed Shiism from a <strong>political<\u002Fstrong> movement into a <strong>theological<\u002Fstrong> one — built on the guilt of what was done.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #d4c9aa;padding-left:64px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#1f5a42;margin-bottom:20px;\">The Sunni verdict<\u002Fdiv>\n      <p style=\"font-size:34px;line-height:1.5;margin:0 0 22px;color:#39402f;\">A historical tragedy of the highest magnitude — yet <strong>not a pillar of creed<\u002Fstrong>. Sunni law and theology remain unchanged by it.<\u002Fp>\n      <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:34px;line-height:1.35;margin:0;color:#842231;\">Still, the heart bleeds for the grandson of the Prophet.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 31 · CLOSING -->\n<section data-label=\"Closing\" data-screen-label=\"28\" data-speaker-notes=\"Close on the dignity of the family and the duty of an honest, civil memory.\" style=\"box-sizing:border-box;background:#0f211a;color:#f1e9d6;padding:0 130px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-family:'Spectral',serif;\">\n  <span style=\"width:18px;height:18px;border:1.6px solid #bf9b4a;transform:rotate(45deg);display:inline-block;margin-bottom:40px;\"><\u002Fspan>\n  <div style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:62px;line-height:1.3;color:#f4ecd8;max-width:1400px;\">Remembered with honour, studied with honesty, and mourned without rancour.<\u002Fdiv>\n  <div style=\"width:140px;height:2px;background:#bf9b4a;margin:48px 0 26px;\"><\u002Fdiv>\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:24px;letter-spacing:0.2em;color:#7e8c78;\">THE MASSACRE OF KARBALA · 61 AH<\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
