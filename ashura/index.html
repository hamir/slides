55);border-radius:50%;\"><\u002Fspan>\n      <span style=\"position:absolute;inset:22px;border:1px solid rgba(201,162,75,0.7);transform:rotate(45deg);\"><\u002Fspan>\n      <span style=\"width:14px;height:14px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-family:'Amiri',serif;font-size:88px;color:#f4eede;margin:0 0 30px;direction:rtl;line-height:1;\">عَاشُورَاء<\u002Fp>\n    <h1 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:74px;line-height:1.06;margin:0;color:#f4eede;max-width:1200px;\">The Significance of Ashūrāʾ in Islam<\u002Fh1>\n    <div style=\"width:90px;height:1px;background:#c9a24b;margin:40px 0;\"><\u002Fdiv>\n    <p style=\"font-size:30px;font-style:italic;color:#94a89c;margin:0;max-width:880px;\">A comprehensive Sunni perspective, grounded in authentic evidence<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 2 · GOAL -->\n  <section data-label=\"Our Goal\" data-speaker-notes=\"Frame the whole talk: we present Ashūrāʾ the way the Prophet ﷺ taught it — gratitude, fasting, remembrance, reflection, steadfastness.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Our Goal<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:56px;line-height:1.18;margin:0 0 46px;color:#f4eede;max-width:1340px;\">To present Ashūrāʾ as the Prophet ﷺ taught it.<\u002Fh2>\n    <div style=\"display:flex;flex-wrap:wrap;gap:20px;max-width:1400px;\">\n      <span style=\"font-size:27px;padding:16px 30px;border:1px solid rgba(201,162,75,0.4);color:#ece5d6;\">Gratitude<\u002Fspan>\n      <span style=\"font-size:27px;padding:16px 30px;border:1px solid rgba(201,162,75,0.4);color:#ece5d6;\">Fasting<\u002Fspan>\n      <span style=\"font-size:27px;padding:16px 30px;border:1px solid rgba(201,162,75,0.4);color:#ece5d6;\">Remembrance of Allah's deliverance<\u002Fspan>\n      <span style=\"font-size:27px;padding:16px 30px;border:1px solid rgba(201,162,75,0.4);color:#ece5d6;\">Reflection upon history<\u002Fspan>\n      <span style=\"font-size:27px;padding:16px 30px;border:1px solid rgba(201,162,75,0.4);color:#ece5d6;\">Lessons in steadfastness<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 · INTRODUCTION -->\n  <section data-label=\"Introduction\" data-speaker-notes=\"Open by asking the room. Most think of Karbalāʾ. But Ashūrāʾ predates it by thousands of years — its Sunnah is independent and established.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Introduction<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:60px;line-height:1.14;margin:0 0 40px;color:#f4eede;max-width:1300px;\">\"When you hear the word Ashūrāʾ, what comes to mind?\"<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 70px;max-width:1440px;font-size:29px;line-height:1.55;color:#cdd8cf;\">\n      <p style=\"margin:0;\">Many of us think immediately of <span style=\"color:#f4eede;\">Karbalāʾ<\u002Fspan> — one of the greatest tragedies in Islamic history.<\u002Fp>\n      <p style=\"margin:0;\">Yet the significance of Ashūrāʾ <span style=\"color:#f4eede;\">predates Karbalāʾ by thousands of years.<\u002Fspan><\u002Fp>\n      <p style=\"margin:0;\">The Prophet ﷺ taught its virtues years <span style=\"color:#f4eede;\">before<\u002Fspan> the martyrdom of al-Ḥusayn رضي الله عنه.<\u002Fp>\n      <p style=\"margin:0;color:#c9a24b;font-style:italic;\">The Sunnah of Ashūrāʾ is therefore independent, established, and enduring.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 · PART 1 DIVIDER -->\n  <section data-label=\"Part 1 — What is Ashūrāʾ\" data-speaker-notes=\"Part 1. Define the term and place it within Muḥarram, one of Allah's sacred months.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">1<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part One<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:88px;line-height:1.04;margin:0;color:#f4eede;\">What is Ashūrāʾ?<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 5 · PART 1 MEANING -->\n  <section data-label=\"Meaning\" data-speaker-notes=\"ʿAshūrāʾ from ʿAsharah, ten — the tenth of Muḥarram. Muḥarram is itself a sacred month.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;gap:80px;align-items:center;max-width:1500px;\">\n      <div style=\"flex-shrink:0;text-align:center;\">\n        <p style=\"font-family:'Amiri',serif;font-size:80px;color:#c9a24b;margin:0 0 12px;direction:rtl;\">عَشَرَة<\u002Fp>\n        <p style=\"font-size:24px;color:#94a89c;margin:0;font-style:italic;\">ʿAsharah — \"ten\"<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:220px;background:rgba(201,162,75,0.35);\"><\u002Fdiv>\n      <div>\n        <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:56px;line-height:1.12;margin:0 0 26px;color:#f4eede;\">The tenth day of Muḥarram.<\u002Fh2>\n        <p style=\"font-size:30px;line-height:1.55;color:#cdd8cf;margin:0;max-width:760px;\">The word <span style=\"color:#f4eede;\">Ashūrāʾ<\u002Fspan> derives from <span style=\"color:#f4eede;\">ʿAsharah<\u002Fspan> — ten. And Muḥarram is not an ordinary month: it is one of the <span style=\"color:#c9a24b;\">four sacred months<\u002Fspan> of Allah.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 · QURAN 9:36 -->\n  <section data-label=\"Qur'an 9:36\" data-speaker-notes=\"The sacred months are established in the Qur'an. Read the āyah; note Muḥarram is among the four ḥurum.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 160px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:42px;\">Qur'an · Sūrah al-Tawbah 9:36<\u002Fspan>\n    <p style=\"font-family:'Amiri',serif;font-size:58px;line-height:1.85;color:#f4eede;margin:0 0 40px;direction:rtl;max-width:1400px;\">إِنَّ عِدَّةَ ٱلشُّهُورِ عِندَ ٱللَّهِ ٱثْنَا عَشَرَ شَهْرًا ۛ مِّنْهَآ أَرْبَعَةٌ حُرُمٌ<\u002Fp>\n    <p style=\"font-size:34px;font-style:italic;line-height:1.5;color:#cdd8cf;margin:0;max-width:1100px;\">\"Indeed the number of months with Allah is twelve… among them are four sacred months.\"<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 7 · SACRED MONTHS -->\n  <section data-label=\"The Sacred Months\" data-speaker-notes=\"The four sacred months named in authentic hadith — Bukhārī 3197, Muslim 1679. Three are consecutive; Rajab stands alone.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:34px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">The Four Sacred Months<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:26px;max-width:1500px;\">\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:40px 30px;\"><p style=\"font-family:'Amiri',serif;font-size:42px;color:#c9a24b;margin:0 0 16px;direction:rtl;\">ذُو القَعدَة<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:30px;color:#f4eede;margin:0;\">Dhul-Qaʿdah<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:40px 30px;\"><p style=\"font-family:'Amiri',serif;font-size:42px;color:#c9a24b;margin:0 0 16px;direction:rtl;\">ذُو الحِجَّة<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:30px;color:#f4eede;margin:0;\">Dhul-Ḥijjah<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.75);background:rgba(201,162,75,0.08);padding:40px 30px;\"><p style=\"font-family:'Amiri',serif;font-size:42px;color:#c9a24b;margin:0 0 16px;direction:rtl;\">المُحَرَّم<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:30px;color:#f4eede;margin:0;\">Muḥarram<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:40px 30px;\"><p style=\"font-family:'Amiri',serif;font-size:42px;color:#c9a24b;margin:0 0 16px;direction:rtl;\">رَجَب<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:30px;color:#f4eede;margin:0;\">Rajab<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:40px 0 0;\">Ṣaḥīḥ al-Bukhārī 3197 · Ṣaḥīḥ Muslim 1679<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 8 · PART 2 DIVIDER -->\n  <section data-label=\"Part 2 — Best Month to Fast\" data-speaker-notes=\"Part 2. Muḥarram is the best month for voluntary fasting after Ramadan.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">2<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Two<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:78px;line-height:1.06;margin:0;color:#f4eede;max-width:1300px;\">Muḥarram — the best month for voluntary fasting<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 9 · BEST FASTING HADITH -->\n  <section data-label=\"Shahrullāh\" data-speaker-notes=\"The hadith of Abū Hurayrah — the best fasting after Ramadan is Allah's month, al-Muḥarram. Muslim 1163.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 160px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:42px;\">The Prophet ﷺ said<\u002Fspan>\n    <p style=\"font-family:'Amiri',serif;font-size:54px;line-height:1.85;color:#f4eede;margin:0 0 38px;direction:rtl;max-width:1400px;\">أَفْضَلُ الصِّيَامِ بَعْدَ رَمَضَانَ شَهْرُ اللَّهِ الْمُحَرَّمُ<\u002Fp>\n    <p style=\"font-size:34px;font-style:italic;line-height:1.5;color:#cdd8cf;margin:0 0 30px;max-width:1080px;\">\"The best fasting after Ramadan is fasting in Allah's month, al-Muḥarram.\"<\u002Fp>\n    <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:0;\">Ṣaḥīḥ Muslim 1163<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 10 · SHAHRULLAH NOTES -->\n  <section data-label=\"An Honorific Title\" data-speaker-notes=\"Note 'Shahrullāh' — Allah's month — is given only to Muḥarram. Nawawī: this shows the excellence of fasting throughout it. But the Prophet ﷺ did not fast all of it; he emphasised Ashūrāʾ.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:36px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Notice the wording<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:50px;max-width:1480px;\">\n      <div style=\"border-left:2px solid #c9a24b;padding-left:36px;\">\n        <p style=\"font-family:'Amiri',serif;font-size:50px;color:#c9a24b;margin:0 0 14px;direction:rtl;\">شَهْرُ اللَّه<\u002Fp>\n        <p style=\"font-size:30px;line-height:1.5;color:#cdd8cf;margin:0;\">He called it <span style=\"color:#f4eede;\">\"Shahrullāh\"<\u002Fspan> — Allah's Month. Only Muḥarram receives this honorific.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(201,162,75,0.5);padding-left:36px;\">\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 16px;\">Imam al-Nawawī<\u002Fp>\n        <p style=\"font-size:30px;line-height:1.5;color:#cdd8cf;margin:0 0 22px;\">This indicates the excellence of fasting throughout Muḥarram.<\u002Fp>\n        <p style=\"font-size:28px;line-height:1.5;color:#f4eede;margin:0;font-style:italic;\">Yet the Prophet ﷺ did not fast every day — he especially emphasised Ashūrāʾ.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · PART 3 DIVIDER -->\n  <section data-label=\"Part 3 — Why Significant\" data-speaker-notes=\"Part 3. The reason for its significance: the deliverance of Mūsā and the Children of Israel.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">3<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Three<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:88px;line-height:1.04;margin:0;color:#f4eede;\">Why is Ashūrāʾ significant?<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 12 · THE STORY -->\n  <section data-label=\"The Day Allah Saved Mūsā\" data-speaker-notes=\"In Madinah the Prophet ﷺ found the Jews fasting. They said it was the day Allah saved Mūsā from Pharaoh, so Mūsā fasted it. He said: We have more right to Mūsā than you — and he fasted and commanded it. Bukhārī 2004, Muslim 1130.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">The Narration · Bukhārī 2004<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:center;max-width:1540px;\">\n      <div style=\"font-size:28px;line-height:1.62;color:#cdd8cf;\">\n        <p style=\"margin:0 0 18px;\">Arriving in Madinah, the Prophet ﷺ saw the Jews fasting. He asked, <span style=\"color:#f4eede;\">\"What is this?\"<\u002Fspan><\u002Fp>\n        <p style=\"margin:0 0 18px;\">They replied: <span style=\"color:#f4eede;\">\"This is a righteous day — the day Allah saved Mūsā and the Children of Israel from Pharaoh. So Mūsā fasted it.\"<\u002Fspan><\u002Fp>\n        <p style=\"margin:0;\">The Prophet ﷺ replied: <span style=\"color:#c9a24b;font-style:italic;\">\"We have more right to Mūsā than you.\"<\u002Fspan> Then he fasted it and commanded the Muslims to fast it.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:46px 40px;text-align:center;\">\n        <p style=\"font-family:'Amiri',serif;font-size:50px;line-height:1.7;color:#f4eede;margin:0 0 20px;direction:rtl;\">نَحْنُ أَحَقُّ بِمُوسَىٰ مِنْكُمْ<\u002Fp>\n        <p style=\"font-size:25px;font-style:italic;color:#94a89c;margin:0;\">\"We have more right to Mūsā than you.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · LESSON 1 -->\n  <section data-label=\"Lesson 1 — Continuation\" data-speaker-notes=\"Lesson one: Islam continues previous revelation. The Prophet ﷺ affirmed Mūsā, did not reject him. We love the prophets more than those who reject Muhammad ﷺ.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:30px;\"><span style=\"font-family:'Marcellus',serif;font-size:60px;color:#c9a24b;line-height:1;\">01<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">Important Lesson<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:58px;line-height:1.12;margin:0 0 34px;color:#f4eede;max-width:1300px;\">Islam is the continuation of previous revelation.<\u002Fh2>\n    <p style=\"font-size:31px;line-height:1.55;color:#cdd8cf;margin:0 0 30px;max-width:1280px;\">The Prophet ﷺ did not reject Mūsā — he <span style=\"color:#f4eede;\">affirmed<\u002Fspan> him.<\u002Fp>\n    <div style=\"display:flex;align-items:center;gap:22px;font-size:30px;color:#f4eede;\">\n      <span style=\"color:#94a89c;\">We love<\u002Fspan>\n      <span style=\"padding:12px 26px;border:1px solid rgba(201,162,75,0.45);\">Ibrāhīm<\u002Fspan>\n      <span style=\"padding:12px 26px;border:1px solid rgba(201,162,75,0.45);\">Mūsā<\u002Fspan>\n      <span style=\"padding:12px 26px;border:1px solid rgba(201,162,75,0.45);\">ʿĪsā<\u002Fspan>\n      <span style=\"color:#94a89c;\">more than those who reject Muhammad ﷺ.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · LESSON 2 -->\n  <section data-label=\"Lesson 2 — Gratitude\" data-speaker-notes=\"Lesson two: gratitude is shown through worship. Allah saved Mūsā; Mūsā responded by fasting; the Prophet ﷺ responded by fasting. Blessings are preserved by gratitude.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:30px;\"><span style=\"font-family:'Marcellus',serif;font-size:60px;color:#c9a24b;line-height:1;\">02<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">Important Lesson<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:58px;line-height:1.12;margin:0 0 40px;color:#f4eede;max-width:1300px;\">Gratitude is shown through worship.<\u002Fh2>\n    <div style=\"display:flex;gap:40px;align-items:stretch;max-width:1340px;\">\n      <div style=\"flex:1;border:1px solid rgba(201,162,75,0.4);padding:34px 36px;\"><p style=\"font-size:24px;text-transform:uppercase;letter-spacing:0.1em;color:#94a89c;margin:0 0 12px;\">Allah saved Mūsā<\u002Fp><p style=\"font-size:30px;color:#f4eede;margin:0;\">Mūsā responded — by fasting.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;border:1px solid rgba(201,162,75,0.4);padding:34px 36px;\"><p style=\"font-size:24px;text-transform:uppercase;letter-spacing:0.1em;color:#94a89c;margin:0 0 12px;\">Allah preserved the Prophet ﷺ<\u002Fp><p style=\"font-size:30px;color:#f4eede;margin:0;\">Muhammad ﷺ responded — by fasting.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:30px;font-style:italic;color:#c9a24b;margin:40px 0 0;\">The lesson: blessings are preserved by gratitude.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 15 · LESSON 3 -->\n  <section data-label=\"Lesson 3 — Victories\" data-speaker-notes=\"Lesson three: we celebrate victories differently. Many civilisations: feasts, drinking, parties. The prophets: worship, fasting, gratitude.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:30px;\"><span style=\"font-family:'Marcellus',serif;font-size:60px;color:#c9a24b;line-height:1;\">03<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">Important Lesson<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:58px;line-height:1.12;margin:0 0 44px;color:#f4eede;\">We celebrate victories differently.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:50px;max-width:1400px;\">\n      <div>\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 22px;\">Many civilizations celebrate with<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;font-size:30px;color:#cdd8cf;\">\n          <span>Feasts<\u002Fspan><span>Drinking<\u002Fspan><span>Parties<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:44px;\">\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#c9a24b;margin:0 0 22px;\">The prophets celebrated with<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;font-size:30px;color:#f4eede;\">\n          <span>Worship<\u002Fspan><span>Fasting<\u002Fspan><span>Gratitude<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 · PART 4 DIVIDER -->\n  <section data-label=\"Part 4 — Once Obligatory\" data-speaker-notes=\"Part 4. Before Ramadan, fasting Ashūrāʾ was obligatory.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">4<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Four<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:84px;line-height:1.04;margin:0;color:#f4eede;\">Ashūrāʾ used to be obligatory<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 17 · AISHAH NARRATION -->\n  <section data-label=\"ʿĀʾishah's Narration\" data-speaker-notes=\"ʿĀʾishah رضي الله عنها: Quraysh fasted Ashūrāʾ in Jāhiliyyah; the Prophet ﷺ fasted it and ordered it; when Ramadan was prescribed, he left it optional. Bukhārī 2002, Muslim 1125.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">ʿĀʾishah رضي الله عنها · Bukhārī 2002<\u002Fspan><\u002Fdiv>\n    <p style=\"font-size:34px;line-height:1.62;color:#cdd8cf;margin:0 0 30px;max-width:1480px;\">\"The Quraysh used to fast Ashūrāʾ during Jāhiliyyah. The Messenger of Allah ﷺ also fasted it. When he migrated to Madinah, he fasted it and ordered others to fast it.<\u002Fp>\n    <p style=\"font-size:34px;line-height:1.62;color:#f4eede;margin:0;max-width:1480px;\">Then, when Ramadan was prescribed, he said: <span style=\"color:#c9a24b;font-style:italic;\">whoever wishes may fast it, and whoever wishes may leave it.\"<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <!-- 18 · TEMPORARY LEGISLATION -->\n  <section data-label=\"A Lesson in Legislation\" data-speaker-notes=\"Sometimes Allah legislates something temporarily. The obligation was lifted, but the virtue remained.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 160px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:38px;\">Important Lesson<\u002Fspan>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:58px;line-height:1.2;margin:0 0 30px;color:#f4eede;max-width:1280px;\">Sometimes Allah legislates something temporarily.<\u002Fh2>\n    <p style=\"font-size:36px;font-style:italic;line-height:1.5;color:#c9a24b;margin:0;max-width:1100px;\">The obligation was later replaced — but the virtue remained.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 19 · PART 5 DIVIDER -->\n  <section data-label=\"Part 5 — The Greatest Virtue\" data-speaker-notes=\"Part 5. The central virtue: expiation of the previous year's sins.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">5<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Five<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:88px;line-height:1.04;margin:0;color:#f4eede;\">The greatest virtue<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 20 · EXPIATION HADITH -->\n  <section data-label=\"Expiation of a Year\" data-speaker-notes=\"The greatest virtue: fasting Ashūrāʾ expiates the previous year's sins. Muslim 1162.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 150px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:40px;\">The Prophet ﷺ said<\u002Fspan>\n    <p style=\"font-family:'Amiri',serif;font-size:50px;line-height:1.9;color:#f4eede;margin:0 0 36px;direction:rtl;max-width:1480px;\">صِيَامُ يَوْمِ عَاشُورَاءَ أَحْتَسِبُ عَلَى اللَّهِ أَنْ يُكَفِّرَ السَّنَةَ الَّتِي قَبْلَهُ<\u002Fp>\n    <p style=\"font-size:34px;font-style:italic;line-height:1.5;color:#cdd8cf;margin:0 0 28px;max-width:1120px;\">\"Fasting the day of Ashūrāʾ — I hope from Allah — will expiate the sins of the previous year.\"<\u002Fp>\n    <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:0;\">Ṣaḥīḥ Muslim 1162<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 21 · HUMILITY -->\n  <section data-label=\"A Lesson in Humility\" data-speaker-notes=\"Notice 'Aḥtasibu ʿalā Allah' — I hope from Allah. Even the Prophet ﷺ teaches humility before Allah.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 150px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:34px;\">Notice the wording<\u002Fspan>\n    <p style=\"font-family:'Amiri',serif;font-size:64px;color:#c9a24b;margin:0 0 26px;direction:rtl;\">أَحْتَسِبُ عَلَى اللَّه<\u002Fp>\n    <p style=\"font-size:36px;font-style:italic;color:#f4eede;margin:0 0 36px;\">\"I hope from Allah.\"<\u002Fp>\n    <p style=\"font-size:32px;line-height:1.5;color:#cdd8cf;margin:0;max-width:1000px;\">Even the Prophet ﷺ — the most beloved to Allah — teaches us <span style=\"color:#c9a24b;\">humility.<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <!-- 22 · WHICH SINS -->\n  <section data-label=\"Which Sins?\" data-speaker-notes=\"Nawawī: the expiation refers to minor sins. Major sins require sincere tawbah. This is the consensus of scholars.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:34px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Which sins are expiated?<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:46px;color:#94a89c;margin:0 0 36px;\">Imam an-Nawawī clarifies<\u002Fh2>\n    <div style=\"display:flex;gap:36px;max-width:1440px;\">\n      <div style=\"flex:1;border:1px solid rgba(201,162,75,0.7);background:rgba(201,162,75,0.07);padding:42px 40px;\"><p style=\"font-family:'Marcellus',serif;font-size:40px;color:#f4eede;margin:0 0 14px;\">Minor sins<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;line-height:1.5;margin:0;\">These are what the fast of Ashūrāʾ expiates.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;border:1px solid rgba(201,162,75,0.35);padding:42px 40px;\"><p style=\"font-family:'Marcellus',serif;font-size:40px;color:#f4eede;margin:0 0 14px;\">Major sins<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;line-height:1.5;margin:0;\">Require sincere <span style=\"color:#c9a24b;\">tawbah<\u002Fspan> — repentance to Allah.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:38px 0 0;\">By the consensus of the scholars.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 23 · PART 6 DIVIDER -->\n  <section data-label=\"Part 6 — His Strong Desire\" data-speaker-notes=\"Part 6. The Prophet's strong personal desire to fast this day.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">6<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Six<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:82px;line-height:1.04;margin:0;color:#f4eede;max-width:1300px;\">The Prophet's strong desire to fast it<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 24 · IBN ABBAS -->\n  <section data-label=\"Ibn ʿAbbās\" data-speaker-notes=\"Ibn ʿAbbās: I never saw the Prophet ﷺ seek to fast any day, preferring it over others, except this day — Ashūrāʾ — and this month, Ramadan. Bukhārī 2006.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:34px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Ibn ʿAbbās رضي الله عنهما · Bukhārī 2006<\u002Fspan><\u002Fdiv>\n    <p style=\"font-size:38px;line-height:1.55;color:#f4eede;font-style:italic;margin:0 0 30px;max-width:1480px;\">\"I never saw the Prophet ﷺ seeking to fast any day, giving it preference over others, except this day — the day of Ashūrāʾ — and this month, meaning Ramadan.\"<\u002Fp>\n    <p style=\"font-size:30px;line-height:1.5;color:#cdd8cf;margin:0;max-width:1300px;\">Among all the voluntary fasts of the year, <span style=\"color:#c9a24b;\">Ashūrāʾ stood out.<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <!-- 25 · PART 7 DIVIDER -->\n  <section data-label=\"Part 7 — Fast the Ninth\" data-speaker-notes=\"Part 7. The Sunnah of joining the ninth with the tenth.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">7<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Seven<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:88px;line-height:1.04;margin:0;color:#f4eede;\">Fast the ninth too<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 26 · NINTH HADITH -->\n  <section data-label=\"The Ninth\" data-speaker-notes=\"Near the end of his life: If I live until next year, I will fast the ninth. He passed away before the next Muḥarram. Muslim 1134. The reason: to distinguish Muslims from the Jews.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;max-width:1540px;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#c9a24b;\">Muslim 1134<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:34px;line-height:1.55;color:#f4eede;font-style:italic;margin:0 0 26px;\">\"If I live until next year, I will certainly fast the ninth.\"<\u002Fp>\n        <p style=\"font-size:27px;line-height:1.5;color:#94a89c;margin:0;\">He ﷺ passed away before the following Muḥarram.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:46px;\">\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 18px;\">Why the ninth?<\u002Fp>\n        <p style=\"font-size:32px;line-height:1.5;color:#f4eede;margin:0;\">To distinguish the Muslims from the practice of the Jews.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 27 · WAYS TO FAST -->\n  <section data-label=\"Recommended Ways to Fast\" data-speaker-notes=\"Three tiers: best is 9 + 10; also good 10 + 11 per some scholars; minimum is the 10th alone, which still fulfils the Sunnah per most scholars.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:40px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Recommended ways to fast<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1520px;\">\n      <div style=\"border:1px solid rgba(201,162,75,0.75);background:rgba(201,162,75,0.08);padding:46px 38px;\"><p style=\"font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#c9a24b;margin:0 0 18px;\">Best<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:60px;color:#f4eede;margin:0 0 16px;\">9th + 10th<\u002Fp><p style=\"font-size:25px;color:#cdd8cf;line-height:1.45;margin:0;\">The Sunnah the Prophet ﷺ intended in his final year.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:46px 38px;\"><p style=\"font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#94a89c;margin:0 0 18px;\">Also good<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:60px;color:#f4eede;margin:0 0 16px;\">10th + 11th<\u002Fp><p style=\"font-size:25px;color:#cdd8cf;line-height:1.45;margin:0;\">Supported by reports from some scholars.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:46px 38px;\"><p style=\"font-size:24px;letter-spacing:0.12em;text-transform:uppercase;color:#94a89c;margin:0 0 18px;\">Minimum<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:60px;color:#f4eede;margin:0 0 16px;\">10th alone<\u002Fp><p style=\"font-size:25px;color:#cdd8cf;line-height:1.45;margin:0;\">Still fulfils the Sunnah, according to most scholars.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 28 · PART 8 DIVIDER -->\n  <section data-label=\"Part 8 — Weak Hadith\" data-speaker-notes=\"Part 8. Common weak and fabricated narrations to be aware of.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">8<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Eight<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:84px;line-height:1.04;margin:0;color:#f4eede;\">Common weak hadith<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 29 · WEAK HADITH -->\n  <section data-label=\"Fabricated Narrations\" data-speaker-notes=\"Many fabricated narrations exist — generous spending, kohl, bathing, cutting nails, visiting. Scholars graded these weak or fabricated: Ibn Taymiyyah, Ibn al-Qayyim, Ibn al-Jawzī, al-Albānī. The authentic Sunnah is sufficient.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:60px;max-width:1560px;\">\n      <div>\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 22px;\">Often quoted, but unauthentic<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;font-size:28px;color:#cdd8cf;\">\n          <span>\"Whoever spends generously on family…\"<\u002Fspan>\n          <span>\"Whoever wears kohl…\"<\u002Fspan>\n          <span>\"Whoever bathes…\"<\u002Fspan>\n          <span>\"Whoever cuts their nails…\"<\u002Fspan>\n          <span>\"Whoever visits…\"<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:46px;\">\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#c9a24b;margin:0 0 22px;\">Graded weak or fabricated by<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:12px;font-size:28px;color:#f4eede;\">\n          <span>Ibn Taymiyyah<\u002Fspan><span>Ibn al-Qayyim<\u002Fspan><span>Ibn al-Jawzī<\u002Fspan><span>Al-Albānī<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:27px;font-style:italic;color:#c9a24b;margin:30px 0 0;\">The authentic Sunnah is sufficient.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 30 · PART 9 — NUH -->\n  <section data-label=\"Part 9 — Did Nūḥ Fast?\" data-speaker-notes=\"Part 9. The popular story that Nūḥ's ark rested on Mount Jūdī on Ashūrāʾ exists, but scholars generally grade it weak. Do not teach it as established fact.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:30px;\"><span style=\"font-family:'Marcellus',serif;font-size:48px;color:#c9a24b;line-height:1;\">Part 9<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">A popular story<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:56px;line-height:1.12;margin:0 0 30px;color:#f4eede;max-width:1300px;\">Did Nūḥ fast Ashūrāʾ?<\u002Fh2>\n    <p style=\"font-size:32px;line-height:1.55;color:#cdd8cf;margin:0 0 24px;max-width:1340px;\">It is popularly said that the Ark rested on Mount Jūdī on the day of Ashūrāʾ. A narration exists — <span style=\"color:#f4eede;\">but scholars generally consider it weak.<\u002Fspan><\u002Fp>\n    <p style=\"font-size:30px;font-style:italic;color:#c9a24b;margin:0;\">Do not teach it as an established fact.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 31 · PART 10 — OTHER EVENTS -->\n  <section data-label=\"Part 10 — Other Events\" data-speaker-notes=\"Part 10. Other historical claims — Ādam forgiven, Yūnus rescued, Ibrāhīm saved, Ayyūb cured, Yūsuf reunited. None established by authentic hadith; many from Isrāʾīliyyāt. Avoid presenting as certain.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:30px;\"><span style=\"font-family:'Marcellus',serif;font-size:48px;color:#c9a24b;line-height:1;\">Part 10<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">Other historical events sometimes mentioned<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:18px;max-width:1480px;margin-bottom:38px;\">\n      <span style=\"font-size:27px;padding:14px 28px;border:1px solid rgba(201,162,75,0.35);color:#cdd8cf;\">Ādam forgiven<\u002Fspan>\n      <span style=\"font-size:27px;padding:14px 28px;border:1px solid rgba(201,162,75,0.35);color:#cdd8cf;\">Yūnus rescued<\u002Fspan>\n      <span style=\"font-size:27px;padding:14px 28px;border:1px solid rgba(201,162,75,0.35);color:#cdd8cf;\">Ibrāhīm saved<\u002Fspan>\n      <span style=\"font-size:27px;padding:14px 28px;border:1px solid rgba(201,162,75,0.35);color:#cdd8cf;\">Ayyūb cured<\u002Fspan>\n      <span style=\"font-size:27px;padding:14px 28px;border:1px solid rgba(201,162,75,0.35);color:#cdd8cf;\">Yūsuf reunited<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:31px;line-height:1.55;color:#f4eede;margin:0;max-width:1380px;\">None of these are established by authentic hadith. Many originate from <span style=\"color:#c9a24b;\">Isrāʾīliyyāt.<\u002Fspan> Avoid presenting them as certain.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 32 · PART 11 DIVIDER -->\n  <section data-label=\"Part 11 — Karbalāʾ\" data-speaker-notes=\"Part 11. Karbalāʾ — to be presented with balance and authentic evidence.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">11<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Eleven<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:88px;line-height:1.04;margin:0 0 22px;color:#f4eede;\">Karbalāʾ<\u002Fh2>\n    <p style=\"font-size:30px;font-style:italic;color:#94a89c;margin:0;\">To be presented with balance.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 33 · MARTYRDOM -->\n  <section data-label=\"The Martyrdom of al-Ḥusayn\" data-speaker-notes=\"The martyrdom of al-Ḥusayn occurred on 10 Muḥarram, 61 AH, near Karbalāʾ in Iraq.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:36px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">The Martyrdom of al-Ḥusayn رضي الله عنه<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1440px;\">\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:44px 38px;\"><p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 14px;\">When<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:40px;color:#f4eede;margin:0;\">10 Muḥarram<br>61 AH<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:44px 38px;\"><p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 14px;\">Where<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:40px;color:#f4eede;margin:0;\">Karbalāʾ<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:44px 38px;\"><p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#94a89c;margin:0 0 14px;\">Region<\u002Fp><p style=\"font-family:'Marcellus',serif;font-size:40px;color:#f4eede;margin:0;\">Iraq<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 34 · WHO WAS HUSAYN -->\n  <section data-label=\"Who Was al-Ḥusayn?\" data-speaker-notes=\"He was the grandson of the Prophet ﷺ, and a leader of the youth of Paradise. 'Al-Ḥasan and al-Ḥusayn are the leaders of the youth of Paradise.' Tirmidhī 3768, authenticated by al-Albānī.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Who was al-Ḥusayn?<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:18px;margin-bottom:40px;font-size:33px;color:#f4eede;\">\n      <span>The grandson of the Prophet ﷺ.<\u002Fspan>\n      <span>A leader of the youth of Paradise.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"border:1px solid rgba(201,162,75,0.4);padding:40px 44px;max-width:1400px;text-align:center;\">\n      <p style=\"font-family:'Amiri',serif;font-size:46px;line-height:1.7;color:#f4eede;margin:0 0 18px;direction:rtl;\">الْحَسَنُ وَالْحُسَيْنُ سَيِّدَا شَبَابِ أَهْلِ الْجَنَّةِ<\u002Fp>\n      <p style=\"font-size:28px;font-style:italic;color:#cdd8cf;margin:0 0 14px;\">\"Al-Ḥasan and al-Ḥusayn are the leaders of the youth of Paradise.\"<\u002Fp>\n      <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:0;\">Jāmiʿ al-Tirmidhī 3768 · authenticated by al-Albānī<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 35 · PROPHET LOVED HIM -->\n  <section data-label=\"The Prophet's Love\" data-speaker-notes=\"The Prophet ﷺ loved him deeply: 'O Allah, I love him, so love him.' Bukhārī 3749. He carried al-Ḥasan and al-Ḥusayn, prayed while they climbed on him, lengthened his sujūd, kissed them publicly.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 140px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;max-width:1560px;\">\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:46px 42px;text-align:center;\">\n        <p style=\"font-size:24px;letter-spacing:0.2em;text-transform:uppercase;color:#94a89c;margin:0 0 24px;\">Bukhārī 3749<\u002Fp>\n        <p style=\"font-family:'Amiri',serif;font-size:52px;line-height:1.7;color:#f4eede;margin:0 0 20px;direction:rtl;\">اللَّهُمَّ إِنِّي أُحِبُّهُ فَأَحِبَّهُ<\u002Fp>\n        <p style=\"font-size:27px;font-style:italic;color:#cdd8cf;margin:0;\">\"O Allah, I love him, so love him.\"<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:24px;letter-spacing:0.1em;text-transform:uppercase;color:#c9a24b;margin:0 0 24px;\">He ﷺ would<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:16px;font-size:30px;color:#cdd8cf;\">\n          <span>Carry al-Ḥasan and al-Ḥusayn<\u002Fspan>\n          <span>Pray while they climbed on him<\u002Fspan>\n          <span>Lengthen his sujūd for them<\u002Fspan>\n          <span>Kiss them publicly<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 36 · KARBALA LESSONS -->\n  <section data-label=\"The Lesson of Karbalāʾ\" data-speaker-notes=\"The murder of al-Ḥusayn was a tremendous crime, one of the greatest tragedies of Islamic history. Ahl al-Sunnah neither ignore it nor exaggerate beyond authentic evidence.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:36px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">The balanced position<\u002Fspan><\u002Fdiv>\n    <p style=\"font-size:36px;line-height:1.5;color:#f4eede;margin:0 0 44px;max-width:1380px;\">The murder of al-Ḥusayn was a <span style=\"color:#c9a24b;\">tremendous crime<\u002Fspan> — one of the greatest tragedies of Islamic history.<\u002Fp>\n    <div style=\"display:flex;gap:36px;max-width:1380px;\">\n      <div style=\"flex:1;border-left:2px solid #c9a24b;padding-left:36px;\"><p style=\"font-size:24px;text-transform:uppercase;letter-spacing:0.1em;color:#94a89c;margin:0 0 12px;\">Ahl al-Sunnah do not<\u002Fp><p style=\"font-size:30px;color:#f4eede;margin:0;\">Ignore it.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;border-left:2px solid #c9a24b;padding-left:36px;\"><p style=\"font-size:24px;text-transform:uppercase;letter-spacing:0.1em;color:#94a89c;margin:0 0 12px;\">Nor do they<\u002Fp><p style=\"font-size:30px;color:#f4eede;margin:0;\">Exaggerate beyond authentic evidence.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 37 · IBN TAYMIYYAH -->\n  <section data-label=\"Ibn Taymiyyah on Karbalāʾ\" data-speaker-notes=\"Ibn Taymiyyah summarises beautifully: the Prophet ﷺ legislated fasting on Ashūrāʾ; he did not legislate mourning ceremonies, nor celebrations — rather, gratitude to Allah.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 160px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:40px;\">Ibn Taymiyyah summarizes<\u002Fspan>\n    <p style=\"font-family:'Marcellus',serif;font-weight:400;font-size:52px;line-height:1.35;margin:0 0 30px;color:#f4eede;max-width:1340px;\">\"The Prophet ﷺ legislated fasting on Ashūrāʾ. He did not legislate mourning ceremonies, nor celebrations —<\u002Fp>\n    <p style=\"font-size:40px;font-style:italic;color:#c9a24b;margin:0;\">rather, gratitude to Allah.\"<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 38 · PART 12 DIVIDER -->\n  <section data-label=\"Part 12 — Innovation\" data-speaker-notes=\"Part 12. Two opposite innovations around Ashūrāʾ.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">12<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Twelve<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:84px;line-height:1.04;margin:0;color:#f4eede;\">Ashūrāʾ and innovation<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 39 · TWO INNOVATIONS -->\n  <section data-label=\"Two Opposite Innovations\" data-speaker-notes=\"Two opposite extremes emerged — making it a festival (special foods, decorations) with no basis; or a yearly mourning ritual with self-flagellation and wailing. The Prophet ﷺ forbade the latter: 'He is not of us who slaps the cheeks, tears the clothes, and calls with the calls of Jāhiliyyah.' Bukhārī 1294, Muslim 103.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:80px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Two opposite innovations emerged<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;max-width:1520px;margin-bottom:34px;\">\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:34px 38px;\"><p style=\"font-family:'Marcellus',serif;font-size:34px;color:#f4eede;margin:0 0 14px;\">A festival<\u002Fp><p style=\"font-size:26px;line-height:1.45;color:#cdd8cf;margin:0;\">Special foods, decorations, celebrations — with no authentic basis.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid rgba(201,162,75,0.4);padding:34px 38px;\"><p style=\"font-family:'Marcellus',serif;font-size:34px;color:#f4eede;margin:0 0 14px;\">A mourning ritual<\u002Fp><p style=\"font-size:26px;line-height:1.45;color:#cdd8cf;margin:0;\">Self-flagellation, wailing, striking oneself.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:2px solid #c9a24b;padding-left:40px;max-width:1480px;\">\n      <p style=\"font-size:30px;line-height:1.5;color:#f4eede;font-style:italic;margin:0 0 10px;\">\"He is not from us who slaps the cheeks, tears the clothes, and calls with the calls of Jāhiliyyah.\"<\u002Fp>\n      <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:0;\">Bukhārī 1294 · Muslim 103<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 40 · PART 13 DIVIDER -->\n  <section data-label=\"Part 13 — Reflections\" data-speaker-notes=\"Part 13. Beautiful reflections from the scholars.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:100px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"position:absolute;top:60px;right:90px;font-family:'Marcellus',serif;font-size:300px;color:rgba(201,162,75,0.10);line-height:1;\">13<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:28px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.36em;text-transform:uppercase;color:#c9a24b;\">Part Thirteen<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:80px;line-height:1.04;margin:0;color:#f4eede;\">Reflections from the scholars<\u002Fh2>\n  <\u002Fsection>\n\n  <!-- 41 · THREE REFLECTIONS -->\n  <section data-label=\"Three Reflections\" data-speaker-notes=\"Ibn al-Qayyim: gratitude has three parts — heart, tongue, limbs — and Ashūrāʾ combines all three. Ibn Rajab: the prophets remembered Allah's blessings, not merely historical events. Nawawī: the expiation is of minor sins; combine fasting with repentance.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 120px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:30px;max-width:1560px;\">\n      <div style=\"border-top:2px solid #c9a24b;padding:30px 30px 0;\"><p style=\"font-family:'Marcellus',serif;font-size:34px;color:#f4eede;margin:0 0 20px;\">Ibn al-Qayyim<\u002Fp><p style=\"font-size:26px;line-height:1.5;color:#cdd8cf;margin:0 0 18px;\">Gratitude has three parts:<\u002Fp><div style=\"display:flex;flex-direction:column;gap:8px;font-size:27px;color:#c9a24b;\"><span>Heart<\u002Fspan><span>Tongue<\u002Fspan><span>Limbs<\u002Fspan><\u002Fdiv><p style=\"font-size:25px;line-height:1.45;color:#cdd8cf;margin:18px 0 0;font-style:italic;\">Ashūrāʾ combines all three.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid rgba(201,162,75,0.5);padding:30px 30px 0;\"><p style=\"font-family:'Marcellus',serif;font-size:34px;color:#f4eede;margin:0 0 20px;\">Ibn Rajab<\u002Fp><p style=\"font-size:27px;line-height:1.55;color:#cdd8cf;margin:0;\">The prophets remembered Allah's <span style=\"color:#c9a24b;\">blessings<\u002Fspan> — not merely historical events.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid rgba(201,162,75,0.5);padding:30px 30px 0;\"><p style=\"font-family:'Marcellus',serif;font-size:34px;color:#f4eede;margin:0 0 20px;\">Imam Nawawī<\u002Fp><p style=\"font-size:27px;line-height:1.55;color:#cdd8cf;margin:0;\">The expiation refers to minor sins. One should combine fasting with <span style=\"color:#c9a24b;\">repentance.<\u002Fspan><\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 42 · PART 14 — MUSA & MUHAMMAD -->\n  <section data-label=\"Part 14 — Musā &amp; Muhammad\" data-speaker-notes=\"Part 14. The parallels: Mūsā saved from Pharaoh, Muhammad ﷺ saved from Quraysh after Hijrah; Mūsā fasted, Muhammad ﷺ fasted. Allah unites the prophets.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:baseline;gap:24px;margin-bottom:40px;\"><span style=\"font-family:'Marcellus',serif;font-size:48px;color:#c9a24b;line-height:1;\">Part 14<\u002Fspan><span style=\"font-size:24px;letter-spacing:0.3em;text-transform:uppercase;color:#94a89c;\">Connections between Mūsā and Muhammad ﷺ<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:50px;align-items:center;max-width:1520px;\">\n      <div style=\"display:flex;flex-direction:column;gap:22px;text-align:right;\">\n        <p style=\"font-family:'Marcellus',serif;font-size:38px;color:#f4eede;margin:0;\">Mūsā<\u002Fp>\n        <p style=\"font-size:28px;color:#cdd8cf;margin:0;line-height:1.4;\">Saved from Pharaoh<\u002Fp>\n        <p style=\"font-size:28px;color:#cdd8cf;margin:0;line-height:1.4;\">Responded by fasting<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:240px;background:rgba(201,162,75,0.4);\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:22px;\">\n        <p style=\"font-family:'Marcellus',serif;font-size:38px;color:#f4eede;margin:0;\">Muhammad ﷺ<\u002Fp>\n        <p style=\"font-size:28px;color:#cdd8cf;margin:0;line-height:1.4;\">Saved from Quraysh after the Hijrah<\u002Fp>\n        <p style=\"font-size:28px;color:#cdd8cf;margin:0;line-height:1.4;\">Responded by fasting<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:32px;font-style:italic;color:#c9a24b;text-align:center;margin:46px 0 0;\">Allah unites the prophets.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 43 · PRACTICAL SUNNAHS -->\n  <section data-label=\"Practical Sunnahs\" data-speaker-notes=\"The practical takeaways: fast the 9th and 10th; if missed, fast the 10th; increase gratitude; make tawbah; reflect on Allah's victories; teach children; read the story of Mūsā.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:40px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Practical Sunnahs<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px 60px;max-width:1500px;\">\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Fast the 9th and 10th<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>If missed, fast the 10th<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Increase in gratitude<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Make tawbah<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Reflect on Allah's victories<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Teach the children<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;font-size:30px;color:#f4eede;padding-bottom:18px;\"><span style=\"color:#c9a24b;font-size:24px;\">◆<\u002Fspan>Read the story of Mūsā<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 44 · FAQ -->\n  <section data-label=\"Frequently Asked Questions\" data-speaker-notes=\"FAQ. Is fasting obligatory? No — a recommended Sunnah. Can women fast while menstruating? No, and no makeup is due since it is voluntary. Missed the ninth? Fast the tenth. Only the ninth? No — the Sunnah centres on the tenth. Does it erase major sins? No — only sincere tawbah.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:74px 120px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Frequently Asked Questions<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:18px;max-width:1560px;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:40px;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><p style=\"font-size:27px;color:#f4eede;margin:0;\">Is fasting Ashūrāʾ obligatory?<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;margin:0;\"><span style=\"color:#c9a24b;\">No.<\u002Fspan> It is a recommended Sunnah.<\u002Fp><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:40px;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><p style=\"font-size:27px;color:#f4eede;margin:0;\">Can women fast while menstruating?<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;margin:0;\"><span style=\"color:#c9a24b;\">No<\u002Fspan> — and no makeup fast is due, since it is voluntary.<\u002Fp><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:40px;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><p style=\"font-size:27px;color:#f4eede;margin:0;\">If I missed the ninth?<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;margin:0;\">Fast the <span style=\"color:#c9a24b;\">tenth.<\u002Fspan><\u002Fp><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:40px;border-bottom:1px solid rgba(201,162,75,0.18);padding-bottom:18px;\"><p style=\"font-size:27px;color:#f4eede;margin:0;\">Can I fast only the ninth?<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;margin:0;\"><span style=\"color:#c9a24b;\">No.<\u002Fspan> The Sunnah centres on the tenth.<\u002Fp><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:40px;\"><p style=\"font-size:27px;color:#f4eede;margin:0;\">Does Ashūrāʾ erase major sins?<\u002Fp><p style=\"font-size:27px;color:#cdd8cf;margin:0;\"><span style=\"color:#c9a24b;\">No<\u002Fspan> — only sincere tawbah.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 45 · CLOSING REFLECTION -->\n  <section data-label=\"Closing Reflection\" data-speaker-notes=\"Closing. A timeless pattern: Allah tests His servants, the believers remain patient, and Allah grants victory in His own time. From Mūsā at the sea to al-Ḥusayn at Karbalāʾ — truth is measured by faithfulness, not worldly success.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:90px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:34px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Closing Reflection<\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-family:'Marcellus',serif;font-weight:400;font-size:44px;color:#94a89c;margin:0 0 30px;\">A timeless pattern runs throughout the Qur'an<\u002Fh2>\n    <div style=\"display:flex;gap:30px;align-items:center;margin-bottom:38px;font-size:30px;color:#f4eede;flex-wrap:wrap;\">\n      <span>Allah tests His servants.<\u002Fspan><span style=\"color:#c9a24b;\">→<\u002Fspan><span>The believers remain patient.<\u002Fspan><span style=\"color:#c9a24b;\">→<\u002Fspan><span>Allah grants victory and relief — in His own time.<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:29px;line-height:1.55;color:#cdd8cf;margin:0;max-width:1500px;\">From the salvation of Mūsā عليه السلام at the sea to the steadfastness of al-Ḥusayn رضي الله عنه at Karbalāʾ, the day reminds us that truth is not measured by immediate worldly success — but by <span style=\"color:#c9a24b;\">faithfulness to Allah.<\u002Fspan><\u002Fp>\n  <\u002Fsection>\n\n  <!-- 46 · QURAN 14:5 -->\n  <section data-label=\"Qur'an 14:5\" data-speaker-notes=\"Allah says: And remind them of the Days of Allah (14:5). Many scholars include the days on which Allah's favours became manifest — and Ashūrāʾ is among them.\" style=\"position:relative;height:100%;background:#13241e;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 160px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.22);pointer-events:none;\"><\u002Fdiv>\n    <span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;margin-bottom:44px;\">Qur'an · Sūrah Ibrāhīm 14:5<\u002Fspan>\n    <p style=\"font-family:'Amiri',serif;font-size:74px;line-height:1.7;color:#f4eede;margin:0 0 38px;direction:rtl;\">وَذَكِّرْهُم بِأَيَّامِ ٱللَّه<\u002Fp>\n    <p style=\"font-size:38px;font-style:italic;color:#cdd8cf;margin:0 0 30px;\">\"And remind them of the Days of Allah.\"<\u002Fp>\n    <p style=\"font-size:28px;line-height:1.55;color:#94a89c;margin:0;max-width:1120px;\">Many scholars understood this to include the days on which Allah's extraordinary favours became manifest. Ashūrāʾ is among those days — a day to remember Allah's deliverance, renew our gratitude, and trust that He will never forsake those who remain steadfast.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 47 · REFERENCES -->\n  <section data-label=\"Key References\" data-speaker-notes=\"The key authentic references underpinning the lecture, from the Qur'an, Bukhārī, Muslim and Tirmidhī.\" style=\"position:relative;height:100%;background:#0f1c18;color:#ece5d6;font-family:'Spectral',serif;display:flex;flex-direction:column;justify-content:center;padding:80px 130px;overflow:hidden;\">\n    <div style=\"position:absolute;inset:34px;border:1px solid rgba(201,162,75,0.18);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:36px;\"><span style=\"width:9px;height:9px;background:#c9a24b;transform:rotate(45deg);\"><\u002Fspan><span style=\"font-size:24px;letter-spacing:0.34em;text-transform:uppercase;color:#c9a24b;\">Key Authentic References<\u002Fspan><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px 56px;max-width:1560px;\">\n      <div style=\"border-left:2px solid #c9a24b;padding-left:30px;\"><p style=\"font-size:24px;letter-spacing:0.08em;text-transform:uppercase;color:#94a89c;margin:0 0 12px;\">Qur'an<\u002Fp><p style=\"font-size:28px;color:#f4eede;margin:0;\">9:36 · 14:5<\u002Fp><\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:30px;\"><p style=\"font-size:24px;letter-spacing:0.08em;text-transform:uppercase;color:#94a89c;margin:0 0 12px;\">Jāmiʿ al-Tirmidhī<\u002Fp><p style=\"font-size:28px;color:#f4eede;margin:0;\">3768 — authenticated by al-Albānī<\u002Fp><\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:30px;\"><p style=\"font-size:24px;letter-spacing:0.08em;text-transform:uppercase;color:#94a89c;margin:0 0 12px;\">Ṣaḥīḥ al-Bukhārī<\u002Fp><p style=\"font-size:28px;color:#f4eede;margin:0;\">2002 · 2004 · 2006 · 3197 · 3749 · 1294<\u002Fp><\u002Fdiv>\n      <div style=\"border-left:2px solid #c9a24b;padding-left:30px;\"><p style=\"font-size:24px;letter-spacing:0.08em;text-transform:uppercase;color:#94a89c;margin:0 0 12px;\">Ṣaḥīḥ Muslim<\u002Fp><p style=\"font-size:28px;color:#f4eede;margin:0;\">1125 · 1130 · 1134 · 1162 · 1163 · 1679<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:24px;font-style:italic;color:#94a89c;margin:44px 0 0;max-width:1400px;\">These narrations form the strongest textual basis for a lecture on the significance of Ashūrāʾ from the perspective of Ahl al-Sunnah.<\u002Fp>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
